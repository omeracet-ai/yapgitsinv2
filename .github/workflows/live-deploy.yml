name: Live FTP Deploy

# Manual trigger only - secret leak guvenligi
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target (web|admin|backend|app|all)'
        required: true
        default: 'all'
        # web: Next.js web app
        # admin: Next.js admin panel
        # backend: NestJS backend
        # app: Flutter web app
        # all: all targets

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Build backend
        if: ${{ inputs.target == 'all' || inputs.target == 'backend' }}
        run: |
          cd nestjs-backend
          npm ci
          npm run build

      - name: Build admin
        if: ${{ inputs.target == 'all' || inputs.target == 'admin' }}
        run: |
          cd admin-panel
          npm ci
          npm run build

      - name: Build web
        if: ${{ inputs.target == 'all' || inputs.target == 'web' }}
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Flutter app (web)
        if: ${{ inputs.target == 'all' || inputs.target == 'app' }}
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: cd hizmet_app && flutter pub get && flutter build web --release
        if: ${{ inputs.target == 'all' || inputs.target == 'app' }}

      - name: FTP Deploy backend
        if: ${{ inputs.target == 'all' || inputs.target == 'backend' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: ${{ secrets.FTP_DIR }}/backend/
          local-dir: ./nestjs-backend/dist/
          protocol: ftps
          exclude: |
            **/node_modules/**
            **/.git*

      - name: FTP Deploy admin
        if: ${{ inputs.target == 'all' || inputs.target == 'admin' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: ${{ secrets.FTP_DIR }}/admin/
          local-dir: ./admin-panel/.next/standalone/
          protocol: ftps

      - name: FTP Deploy web
        if: ${{ inputs.target == 'all' || inputs.target == 'web' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: ${{ secrets.FTP_DIR }}/
          local-dir: ./web/out/
          protocol: ftps

      - name: FTP Deploy Flutter app (web)
        if: ${{ inputs.target == 'all' || inputs.target == 'app' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: ${{ secrets.FTP_DIR }}/app/
          local-dir: ./hizmet_app/build/web/
          protocol: ftps
          exclude: |
            **/node_modules/**
            **/.git*

      - name: Smoke test
        run: |
          sleep 10
          curl -fsS https://yapgitsin.tr/ -o /dev/null && echo "OK"
