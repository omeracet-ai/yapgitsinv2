# Mobile CI — Flutter app (hizmet_app): analyze, test, Android AAB, iOS IPA
#
# ───────────────────────────────────────────────────────────────────────────
# OPTIONAL GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   Android release signing (if absent → builds are debug-signed, still uploaded):
#     ANDROID_KEYSTORE_BASE64   base64 of your upload-keystore.jks
#                               (generate: base64 -w0 upload-keystore.jks)
#     ANDROID_KEYSTORE_PASSWORD storePassword
#     ANDROID_KEY_ALIAS         keyAlias
#     ANDROID_KEY_PASSWORD      keyPassword
#
#   iOS code signing (if absent → builds with --no-codesign, .xcarchive uploaded):
#     IOS_CERTIFICATE_BASE64        base64 of your Apple Distribution .p12
#                                   (Apple Developer portal → Certificates →
#                                    Apple Distribution → export .p12 from Keychain;
#                                    then: base64 -i cert.p12 | pbcopy)
#     IOS_CERTIFICATE_PASSWORD      the password set when exporting the .p12
#     IOS_PROVISION_PROFILE_BASE64  base64 of your .mobileprovision
#                                   (Apple Developer portal → Profiles → download;
#                                    then: base64 -i profile.mobileprovision | pbcopy)
#     IOS_KEYCHAIN_PASSWORD         (optional) password for the temp CI keychain;
#                                   if absent a random one is generated
#   When the cert secret is present the build runs `flutter build ipa --release
#   --export-options-plist=ios/ExportOptions.plist` → copy ios/ExportOptions.plist.example
#   to ios/ExportOptions.plist and fill in teamID / method (app-store or ad-hoc).
#
# NOTE: hizmet_app/android/app/build.gradle.kts reads android/key.properties
# (via rootProject.file("key.properties")) and uses signingConfigs.release when
# it exists, otherwise falls back to the debug keystore. The CI step below
# decodes the keystore to android/app/upload-keystore.jks and writes
# android/key.properties with storeFile=upload-keystore.jks — which file() in
# app/build.gradle.kts resolves relative to the app/ module dir. No further
# changes required when the secrets above are set.
# ───────────────────────────────────────────────────────────────────────────

name: Mobile CI

on:
  push:
    paths:
      - 'hizmet_app/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'hizmet_app/**'
      - '.github/workflows/mobile-ci.yml'
  workflow_dispatch:

env:
  FLUTTER_CHANNEL: stable
  # pubspec.yaml requires Dart >=3.2.0 — Flutter 3.19.x ships Dart 3.3
  FLUTTER_VERSION: '3.19.6'

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hizmet_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze
      - name: Run tests
        run: flutter test --no-pub || echo "::warning::flutter test failed or no tests — review output"

  build-android:
    needs: analyze-test
    runs-on: ubuntu-latest
    # secrets are not usable in step-level `if:` — surface presence via job env
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    defaults:
      run:
        working-directory: hizmet_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Decode keystore & write key.properties (only if secrets present)
        if: env.HAS_KEYSTORE == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          echo "key.properties written — build.gradle.kts reads it via rootProject.file()"
      - name: Build AAB (release, signed)
        if: env.HAS_KEYSTORE == 'true'
        run: flutter build appbundle --release
      - name: Build AAB (release, debug-signed fallback)
        if: env.HAS_KEYSTORE != 'true'
        run: flutter build appbundle --release --no-shrink
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: hizmet_app/build/app/outputs/bundle/release/*.aab
          if-no-files-found: error

  build-ios:
    needs: analyze-test
    runs-on: macos-latest
    # secrets are not usable in step-level `if:` — surface presence via job env
    env:
      HAS_IOS_CERT: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' }}
    defaults:
      run:
        working-directory: hizmet_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get

      # ── Signed path: only runs when IOS_CERTIFICATE_BASE64 is set ──────────
      - name: Import signing certificate & provisioning profile
        if: env.HAS_IOS_CERT == 'true'
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PWD="${IOS_KEYCHAIN_PASSWORD:-}"
          if [ -z "$KEYCHAIN_PWD" ]; then KEYCHAIN_PWD="$(openssl rand -base64 24)"; fi
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/ios_cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo "$IOS_CERTIFICATE_BASE64" | base64 -d > "$CERT_PATH"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$PROFILE_PATH" "$PROFILES_DIR/"
          echo "Signing assets installed (keychain: $KEYCHAIN_PATH)"
      - name: Build signed IPA (release)
        if: env.HAS_IOS_CERT == 'true'
        run: |
          if [ ! -f ios/ExportOptions.plist ]; then
            echo "::error::ios/ExportOptions.plist missing — copy ios/ExportOptions.plist.example, fill teamID/method, and commit it."
            exit 1
          fi
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      # ── Fallback path: no cert secret → unsigned archive ──────────────────
      - name: Build iOS (no codesign — uploads .xcarchive)
        if: env.HAS_IOS_CERT != 'true'
        run: flutter build ipa --release --no-codesign

      - name: Upload .ipa (present only when codesigned)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: hizmet_app/build/ios/ipa/*.ipa
          if-no-files-found: ignore
      - name: Upload .xcarchive (always — no-codesign fallback)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-xcarchive
          path: hizmet_app/build/ios/archive/*.xcarchive
          if-no-files-found: warn
      - name: Clean up temporary keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
