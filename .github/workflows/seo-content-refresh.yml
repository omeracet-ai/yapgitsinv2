name: SEO Content Refresh

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Regenerate ALL entries (ignore cache)'
        type: boolean
        required: false
        default: false
  schedule:
    # Weekly: every Monday 02:00 UTC
    - cron: '0 2 * * 1'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: seo-content-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Generate SEO content
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.PROD_API_URL }}
          GEN_CONTENT_PARALLELISM: '8'
          GEN_CONTENT_MAX_RETRIES: '3'
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            npm run generate-content -- --force
          else
            npm run generate-content
          fi

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- web/src/data/category-content.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request with refreshed content
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(seo): weekly category-content.json refresh'
          title: 'chore(seo): weekly SEO content refresh'
          body: |
            Auto-generated by `.github/workflows/seo-content-refresh.yml`.

            - Source: `web/scripts/generate-category-content.ts`
            - Trigger: ${{ github.event_name }}
            - Force regenerate: `${{ github.event.inputs.force || 'false' }}`

            Review the JSON diff before merging.
          branch: chore/seo-content-refresh
          delete-branch: true
          add-paths: web/src/data/category-content.json

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "No content changes detected — skipping PR."
