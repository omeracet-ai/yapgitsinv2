name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'nestjs-backend/package-lock.json' }
      - run: cd nestjs-backend && npm ci
      - run: cd nestjs-backend && npx tsc --noEmit
      - run: cd nestjs-backend && npm run build
      - name: Phase 152 - Verify profileVideoUrl field
        run: grep -q "profileVideoUrl" nestjs-backend/src/modules/users/user.entity.ts && echo "✅ profileVideoUrl found in User entity"
      - name: Phase 152 - Verify upload endpoint
        run: grep -q "uploadProfileVideo" nestjs-backend/src/modules/uploads/uploads.service.ts && echo "✅ uploadProfileVideo method found"

  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'admin-panel/package-lock.json' }
      - run: cd admin-panel && npm ci
      - run: cd admin-panel && npx tsc --noEmit
      - run: cd admin-panel && npm run build

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'web/package-lock.json' }
      - run: cd web && npm ci
      - run: cd web && npm run build

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable' }
      - run: cd hizmet_app && flutter pub get
      - run: cd hizmet_app && flutter analyze lib/
      - name: Phase 152 - Verify video_player dependency
        run: grep -q "video_player" hizmet_app/pubspec.yaml && echo "✅ video_player dependency found"
      - name: Phase 152 - Verify video widgets
        run: test -f hizmet_app/lib/features/profile/presentation/widgets/profile_video_uploader.dart && echo "✅ ProfileVideoUploader widget found" || echo "⚠️ ProfileVideoUploader widget missing"
