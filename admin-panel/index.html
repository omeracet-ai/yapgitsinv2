<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Yapgitsin Yönetim Paneli — Bakımda</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #2D3E50;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 40px;
      max-width: 460px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #FF5A1F;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 999px;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
    }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { font-size: 15px; line-height: 1.6; color: rgba(255, 255, 255, 0.7); margin-bottom: 24px; }
    a {
      display: inline-block;
      background: #FF5A1F;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 10px;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">BAKIMDA</span>
    <h1>Yapgitsin Yönetim Paneli</h1>
    <p>Yönetim paneli şu anda erişilemiyor. Bakım çalışması tamamlandığında tekrar açılacaktır.</p>
    <a href="https://yapgitsin.tr/">Ana Sayfaya Dön</a>
  </div>
</body>
</html>
