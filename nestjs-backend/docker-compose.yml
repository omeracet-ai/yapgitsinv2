version: '3.8'

services:
  api:
    build: .
    container_name: yapgitsin_api
    ports:
      - '3001:3001'
    env_file: .env.production
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: yapgitsin_db
    environment:
      POSTGRES_DB: ${DB_NAME:-yapgitsin_prod}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yapgitsin_redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
