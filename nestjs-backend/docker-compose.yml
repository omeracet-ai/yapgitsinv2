version: '3.8'

services:
  api:
    build: .
    container_name: yapgitsin_api
    ports:
      - '3001:3001'
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:3001/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g

  db:
    image: postgres:16-alpine
    container_name: yapgitsin_db
    environment:
      POSTGRES_DB: ${DB_NAME:-yapgitsin_prod}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    # Internal only by default — uncomment for external admin access
    # ports:
    #   - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c statement_timeout=30000
      -c idle_in_transaction_session_timeout=60000

  redis:
    image: redis:7-alpine
    container_name: yapgitsin_redis
    # Internal only
    # ports:
    #   - '6379:6379'
    volumes:
      - redisdata:/data
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
  uploads:
