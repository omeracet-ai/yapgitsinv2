name: hizmet_app
description: A new Flutter project for Yapgitsin Platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.1.0
  
  # Networking
  dio: ^5.4.0
  
  # Utility
  equatable: ^2.0.5
  shared_preferences: ^2.2.2
  
  # Fotoğraf seçme
  image_picker: ^1.1.2

  # URL aç (e-posta, telefon, web)
  url_launcher: ^6.2.5

  # Harita
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  geolocator: ^13.0.0

  # UI/UX
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  socket_io_client: ^2.0.3
  webview_flutter: ^4.4.2
  lottie: ^2.7.0
  flutter_animate: ^4.2.0
  shimmer: ^3.0.0
  video_player: ^2.11.1
  chewie: ^1.14.0
  table_calendar: ^3.1.0
  intl: ^0.19.0

  # Paylaşım
  share_plus: ^13.1.0

  # Phase 113 — Firebase Cloud Messaging (mobile push)
  # Real platform setup (google-services.json / GoogleService-Info.plist) is
  # done at deploy time. The FcmService stub silently no-ops if Firebase
  # initialization fails (e.g. web / windows / missing config).
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0





dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

