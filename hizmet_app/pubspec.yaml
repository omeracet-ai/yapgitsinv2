name: hizmet_app
description: A new Flutter project for Yapgitsin Platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^14.0.0
  
  # Networking
  dio: ^5.4.0
  
  # Utility
  equatable: ^2.0.5
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  
  # Fotoğraf seçme
  image_picker: ^1.1.2

  # Dosya seçme (chat attachment — Phase 139)
  # 12.x is the first major to use win32 ^6 (matches share_plus/wakelock_plus);
  # 8.x–11.x pin win32 ^5 which conflicts. 3.0.4 used the removed v1 Android
  # embedding and no longer compiles. Direct constraint aligned with override.
  file_picker: ^12.0.0-beta.2

  # URL aç (e-posta, telefon, web)
  url_launcher: ^6.2.5

  # Harita
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  geolocator: ^13.0.0

  # UI/UX
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  socket_io_client: ^2.0.3
  webview_flutter: ^4.4.2
  lottie: ^3.0.0
  flutter_animate: ^4.2.0
  shimmer: ^3.0.0
  video_player: ^2.11.1
  chewie: ^1.14.0
  table_calendar: ^3.1.0
  intl: ^0.20.0

  # Paylaşım
  share_plus: ^13.1.0

  # Phase 151 — Voice notes in chat (record + playback + permissions)
  record: ^5.0.0
  just_audio: ^0.9.36
  permission_handler: ^11.0.0
  path_provider: ^2.1.1

  # Phase 113 — Firebase Cloud Messaging (mobile push)
  # Real platform setup (google-services.json / GoogleService-Info.plist) is
  # done at deploy time. The FcmService stub silently no-ops if Firebase
  # initialization fails (e.g. web / windows / missing config).
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0





# record 5.2.1's transitive record_linux 0.7.2 doesn't implement the
# record_platform_interface 1.5.0 API pulled in by record_android/darwin,
# breaking compilation. Override record_linux to a compatible version.
dependency_overrides:
  record_linux: ^1.1.0
  file_picker: ^12.0.0-beta.2
  # flutter_secure_storage 9.x pins win32 ^5, share_plus 13.x needs win32 ^6.
  # Force 10.x which uses win32 ^6 to unblock resolution.
  flutter_secure_storage: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

