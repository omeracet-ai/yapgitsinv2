name: hizmet_app
description: A new Flutter project for HizmetApp Platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.1.0
  
  # Networking
  dio: ^5.4.0
  
  # Utility
  equatable: ^2.0.5
  shared_preferences: ^2.2.2
  
  # Fotoğraf seçme
  image_picker: ^1.1.2

  # URL aç (e-posta, telefon, web)
  url_launcher: ^6.2.5

  # Harita
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

  # UI/UX
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  socket_io_client: ^2.0.3
  webview_flutter: ^4.4.2
  lottie: ^2.7.0
  flutter_animate: ^4.2.0
  shimmer: ^3.0.0





dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

